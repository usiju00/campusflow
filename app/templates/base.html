<!DOCTYPE html>
<html>
<head>
    <title>CampusFlow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
        .navbar { background: #1a73e8; padding: 15px 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 20px; }
        .navbar a { color: white; text-decoration: none; }
        .container { max-width: 500px; margin: 30px auto; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 15px; color: #1a73e8; }
        .balance { font-size: 32px; font-weight: bold; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-link { display: block; text-align: center; padding: 12px; background: #f4f6f9; color: #1a73e8; text-decoration: none; border-radius: 8px; margin-top: 10px; }
        .error { color: red; margin-bottom: 10px; }
        .credit { color: green; }
        .debit { color: red; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>CampusFlow</h1>
        {% if current_user.is_authenticated %}
        <a href="/logout">Logout</a>
        {% endif %}
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
