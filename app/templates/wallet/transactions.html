{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Transaction History</h2>
    {% for txn in transactions %}
    <div class="txn">
        <span class="{{ txn.transaction_type }}">
            {{ txn.transaction_type.upper() }}
        </span>
        — NGN {{ txn.amount }}
        — {{ txn.description }}
        — Ref: {{ txn.reference }}
    </div>
    {% else %}
    <p>No transactions yet.</p>
    {% endfor %}
    <a class="btn-link" href="/wallet">Back to Wallet</a>
</div>
{% endblock %}
