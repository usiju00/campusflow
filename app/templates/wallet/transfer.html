<!DOCTYPE html>
<html>
<head>
    <title>CampusFlow - Transfer</title>
</head>
<body>
    <h2>Transfer Money</h2>
    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <input type="text" name="matric_number" placeholder="Recipient Matric Number" required><br>
        <input type="number" name="amount" placeholder="Amount (NGN)" required><br>
        <button type="submit">Transfer</button>
    </form>
    <a href="/wallet">Back to Wallet</a>
</body>
</html>
