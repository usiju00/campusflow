
{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2>Transfer Money</h2>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <input type="text" name="matric_number" placeholder="Recipient Matric Number" required>
        <input type="number" name="amount" placeholder="Amount (NGN)" required>
        <button type="submit">Transfer</button>
    </form>
    <a class="btn-link" href="/wallet">Back to Wallet</a>
</div>
{% endblock %}
